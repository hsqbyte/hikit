name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ─── macOS amd64 ────────────────────────────────────────────────
  build-macos-amd64:
    name: macOS (amd64)
    runs-on: macos-13 # Intel runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform darwin/amd64 -o HiKit-macos-amd64

      - name: Package DMG
        run: |
          cd build/bin
          # Create a simple dmg or just zip the .app
          zip -r HiKit-macos-amd64.zip HiKit-macos-amd64.app 2>/dev/null || \
          zip -r HiKit-macos-amd64.zip HiKit-macos-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: HiKit-macos-amd64
          path: build/bin/HiKit-macos-amd64.zip

  # ─── macOS arm64 (Apple Silicon) ────────────────────────────────
  build-macos-arm64:
    name: macOS (arm64)
    runs-on: macos-14 # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform darwin/arm64 -o HiKit-macos-arm64

      - name: Package
        run: |
          cd build/bin
          zip -r HiKit-macos-arm64.zip HiKit-macos-arm64.app 2>/dev/null || \
          zip -r HiKit-macos-arm64.zip HiKit-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: HiKit-macos-arm64
          path: build/bin/HiKit-macos-arm64.zip

  # ─── Windows amd64 ──────────────────────────────────────────────
  build-windows-amd64:
    name: Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform windows/amd64 -o HiKit-windows-amd64.exe

      - name: Package
        run: |
          cd build/bin
          Compress-Archive -Path HiKit-windows-amd64.exe -DestinationPath HiKit-windows-amd64.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: HiKit-windows-amd64
          path: build/bin/HiKit-windows-amd64.zip

  # ─── Linux amd64 ────────────────────────────────────────────────
  build-linux-amd64:
    name: Linux (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config \
            build-essential \
            libglib2.0-dev \
            libpango1.0-dev \
            libcairo2-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform linux/amd64 -o HiKit-linux-amd64

      - name: Package
        run: |
          cd build/bin
          tar -czf HiKit-linux-amd64.tar.gz HiKit-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: HiKit-linux-amd64
          path: build/bin/HiKit-linux-amd64.tar.gz

  # ─── Linux arm64 ────────────────────────────────────────────────
  build-linux-arm64:
    name: Linux (arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install cross-compile deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config
          # arm64 webkit/gtk
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs) main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev:arm64 \
            libwebkit2gtk-4.0-dev:arm64

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: arm64
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
        run: wails build -platform linux/arm64 -o HiKit-linux-arm64

      - name: Package
        run: |
          cd build/bin
          tar -czf HiKit-linux-arm64.tar.gz HiKit-linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: HiKit-linux-arm64
          path: build/bin/HiKit-linux-arm64.tar.gz

  # ─── Create GitHub Release ───────────────────────────────────────
  release:
    name: Publish Release
    needs:
      - build-macos-amd64
      - build-macos-arm64
      - build-windows-amd64
      - build-linux-amd64
      - build-linux-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: HiKit ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
